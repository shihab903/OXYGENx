<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OXYGEN — Join the Waitlist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center relative overflow-hidden">

  <!-- Subtle background effect -->
  <div class="absolute inset-0 bg-[radial-gradient(at_top_right,#22d3ee20_0%,transparent_50%)]"></div>
  <div class="absolute inset-0 bg-[radial-gradient(at_bottom_left,#a855f720_0%,transparent_50%)]"></div>

  <div class="max-w-md w-full mx-auto px-6 py-12 relative z-10">
    
    <!-- Logo -->
    <div class="flex justify-center mb-8">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-2xl flex items-center justify-center text-3xl font-bold shadow-lg shadow-cyan-500/30">
          O₂
        </div>
        <h1 class="text-5xl font-bold tracking-tighter" style="font-family: 'Space Grotesk', sans-serif;">OXYGEN</h1>
      </div>
    </div>

    <div class="text-center mb-10">
      <p class="text-4xl font-semibold leading-tight">Breathe the Future</p>
      <p class="text-zinc-400 mt-3 text-lg">Something revolutionary is coming.<br>Be the first to experience it.</p>
    </div>

    <!-- Form -->
    <div class="bg-zinc-900/80 backdrop-blur-xl border border-zinc-700 rounded-3xl p-9 shadow-2xl">
      <form id="waitlist-form" class="space-y-6">
        
        <div>
          <label class="block text-sm text-zinc-400 mb-2">Your Full Name</label>
          <input 
            type="text" 
            id="name" 
            required
            class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/30 outline-none transition-all text-lg"
            placeholder="Alex Rahman"
          />
        </div>

        <div>
          <label class="block text-sm text-zinc-400 mb-2">Email Address</label>
          <input 
            type="email" 
            id="email" 
            required
            class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/30 outline-none transition-all text-lg"
            placeholder="you@domain.com"
          />
        </div>

        <button 
          type="submit"
          id="submit-btn"
          class="w-full bg-gradient-to-r from-cyan-500 to-purple-600 hover:from-cyan-600 hover:to-purple-700 py-5 rounded-2xl font-semibold text-xl transition-all duration-300 active:scale-95 flex items-center justify-center gap-3"
        >
          Join the Waitlist
          <span class="text-2xl">→</span>
        </button>
      </form>
    </div>

    <!-- Success Message -->
    <div id="success-message" class="hidden text-center mt-12">
      <div class="mx-auto w-20 h-20 bg-gradient-to-br from-cyan-400 to-purple-500 rounded-3xl flex items-center justify-center text-5xl mb-6 shadow-lg">
        🌬️
      </div>
      <h2 class="text-3xl font-bold mb-3">You're In!</h2>
      <p class="text-zinc-400 text-lg">Thank you for joining OXYGEN Waitlist.<br>We’ll notify you as soon as we launch.</p>
      <p class="text-sm text-zinc-500 mt-8">Get ready to breathe something new.</p>
    </div>

    <p class="text-center text-xs text-zinc-500 mt-10">
      Only for early believers • Limited access
    </p>
  </div>

  <script src="script.js"></script>
</body>
</html>
